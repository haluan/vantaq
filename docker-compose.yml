services:
  device-1:
    build:
      context: .
      dockerfile: docker/device/Dockerfile
    ports:
      - "8080:8080"
    volumes:
      - ./config/device-1/vantaqd.yaml:/etc/vantaqd/vantaqd.yaml:ro
    networks:
      - attestation_net

  verifier-cli:
    image: curlimages/curl:8.12.1
    networks:
      - attestation_net

  test-runner:
    build:
      context: .
      dockerfile: docker/test-runner/Dockerfile
    depends_on:
      - device-1
    networks:
      - attestation_net

networks:
  attestation_net:
    name: attestation_net
    driver: bridge
